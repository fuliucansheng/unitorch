[core/cli]
script_name = core/script/interrogator/clip
data_file = ./data.tsv
device = cpu

[core/interrogator/clip]
pretrained_name = clip-vit-large-patch14
max_seq_length = 77
device = ${core/cli:device}

[core/script/interrogator/clip]
data_file = ${core/cli:data_file}
; Column names in the TSV file (comma-separated), or * to use the first row as header
names = image,label
image_col = image
label_col = label
; Set to True to flip label polarity (1→0, 0→1)
do_reverse = False
