[core/cli]
task_name = core/task/megatron/supervised
from_ckpt_dir = ./cache
cache_dir = ./cache
train_file = ./train.tsv
dev_file = ./dev.tsv

; ── Model ────────────────────────────────────────────────────────────────────
[core/model/generation/megatron/gpt]
config_path = https://raw.githubusercontent.com/fuliucansheng/unitorch/refs/heads/master/examples/configs/megatron/config.json
vocab_size = 102400
num_experts = 64
max_position_embeddings = 4096
normalization = RMSNorm
position_embedding_type = rope
rotary_percent = 1.0
rotary_base = 10000
rope_scaling = False

; Uncomment to load HuggingFace weights (converted via convert_ckpt.py first)
; pretrained_weight_path = ./cache/deepseek-moe-16b/hf_converted.pt

; ── Dataset ──────────────────────────────────────────────────────────────────
[core/dataset/megatron/ast]
names = ['encode', 'decode']

[core/dataset/megatron/ast/train]
data_files = ${core/cli:train_file}
preprocess_functions = ['core/process/llama/generation(encode, decode)']

[core/dataset/megatron/ast/dev]
data_files = ${core/cli:dev_file}
preprocess_functions = ['core/process/llama/generation(encode, decode)']

; ── Processor ────────────────────────────────────────────────────────────────
; DeepSeek-MoE uses the same tokenizer as DeepSeek-V1 (LLaMA-style BPE)
[core/process/llama]
vocab_path = https://huggingface.co/deepseek-ai/deepseek-moe-16b-base/resolve/main/tokenizer.model
max_seq_length = 2048
max_gen_seq_length = 512

; ── Optimizer ────────────────────────────────────────────────────────────────
[core/optim/adamw]
learning_rate = 3e-5
weight_decay = 0.1
betas = [0.9, 0.95]
eps = 1e-8

; ── Scheduler ────────────────────────────────────────────────────────────────
[core/scheduler/cosine_warmup]
num_warmup_rate = 0.01

; ── Task ─────────────────────────────────────────────────────────────────────
[core/task/megatron/supervised]
; Parallelism: TP=8 covers the 2048-dim model across 8 GPUs per node.
; Increase pp_size for multi-node. Set vp_size to enable interleaved schedule.
tensor_model_parallel_size = 8
pipeline_model_parallel_size = 1
context_parallel_size = 1

model     = core/model/generation/megatron/gpt
optim     = core/optim/adamw
scheduler = core/scheduler/cosine_warmup
dataset   = core/dataset/megatron/ast

; seq_length = max_seq_length + max_gen_seq_length
seq_length = 2560

num_workers  = 4
grad_acc_step = 8
max_grad_norm = 1.0

train_batch_size = 2
dev_batch_size   = 4

log_freq  = 100
ckpt_freq = 500

from_ckpt_dir = ${core/cli:from_ckpt_dir}
to_ckpt_dir   = ${core/cli:cache_dir}
